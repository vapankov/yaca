openapi: "3.0.0"

paths:
  /messages:
    get:
      tags:
        - messaging
      operationId: viewMessages
      summary: View messages
      description: |
        Views messages
      parameters:
        - name: pagination.pageNumber
          description: Messages page to view.
          in: query
          required: false
          schema:
            type: integer
            format: uint32
            example: 0
        - name: pagination.pageSize
          description: Number of messages per page.
          in: query
          required: false
          schema:
            type: integer
            format: uint32
            example: 10
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewMessagesResponse'
        'default':
          description: An unexpected error response
          content:
            application/json:
              schema:
                $ref: 'shared.yaml#/components/schemas/ErrorResponse'

components:
  schemas:
    ViewMessagesResponse:
      description: Available messages for viewing
      type: object
      required:
        - items
      properties:
        items:
          description: Messages data items available for viewing
          type: array
          items:
            $ref: '#/components/schemas/ViewMessagesResponseItem'
      additionalProperties: false

    ViewMessagesResponseItem:
      description: Message data available for viewing
      type: object
      required:
        - id
        - contents
        - created_at
      properties:
        id:
          description: Message id
          type: string
          minLength: 1
          example: "abc123"
        contents:
          description: Message contents
          type: string
          example: "Hello World!"
        created_at:
          description: Message creation time formatted as RFC3339
          type: string
          format: date-time
          example: 2006-01-02T15:04:05Z07:00
      additionalProperties: false
