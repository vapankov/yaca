openapi: 3.0.0
info:
  title: Messaging API
  description: API for messaging
  version: 1.0.0
tags:
  - name: messaging
    x-displayName: messaging
paths:
  post:
    operationId: postMessage
    summary: Post message
    description: |
      Posts message
  /messages:
    get:
      tags:
        - messaging
      operationId: viewMessages
      summary: View messages
      description: |
        Views messages
      parameters:
        - name: pagination.pageNumber
          description: Messages page to view.
          in: query
          required: false
          schema:
            type: integer
            format: uint32
            example: 0
        - name: pagination.pageSize
          description: Number of messages per page.
          in: query
          required: false
          schema:
            type: integer
            format: uint32
            example: 10
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewMessagesResponse'
        default:
          description: An unexpected error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    PostMessageRequest:
      description: |
        Message parameters for posting
      type: object
      required:
        - contents
      properties:
        contents:
          description: Message contents
          type: string
          example: Hello World!
      additionalProperties: false
    PostMessageResponse:
      description: Result of message posting
      type: object
      required: []
      properties: {}
      additionalProperties: false
    ViewMessagesResponse:
      description: Available messages for viewing
      type: object
      required:
        - items
      properties:
        items:
          description: Messages data items available for viewing
          type: array
          items:
            $ref: '#/components/schemas/ViewMessagesResponseItem'
      additionalProperties: false
    ViewMessagesResponseItem:
      description: Message data available for viewing
      type: object
      required:
        - id
        - contents
        - created_at
      properties:
        id:
          description: Message id
          type: string
          minLength: 1
          example: abc123
        contents:
          description: Message contents
          type: string
          example: Hello World!
        created_at:
          description: Message creation time formatted as RFC3339
          type: string
          format: date-time
          example: 2006-01-02T15:04:05Z07:00
      additionalProperties: false
    ErrorResponse:
      description: |
        Error response
      type: object
      required:
        - code
        - message
      properties:
        code:
          description: Status code
          type: integer
          format: uint32
          example: 0
        message:
          description: Status message
          type: string
          example: OK
      additionalProperties: false
x-tagGroups:
  - name: messaging_view_messages
    tags:
      - messaging
